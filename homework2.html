<style>
    @font-face {
        font-family: hapnaMedium;
        src: url(font/VL_Hapna\ Slab\ Serif\ Medium.otf);

    @font-face {

    body {

    #title {

    }
    .line {

        text-decoration-line: line-through;
        text-decoration-color: #EEB23D;
        text-decoration-style: double;
        text-decoration-thickness: 4px;
    }
    
</style>
<body>

            <span style="letter-spacing: 50px;"> :<<< </span>
        </div>
        <p style="font-family: hapnaMedium; font-size: 36px; color: #EEB23D; opacity: 0.075; margin: -65px 0 700px 355px;"> không </p>
